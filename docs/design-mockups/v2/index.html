<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Percy — Palette test</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #181818;
    color: #ECEAE0;
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }
  a { color: inherit; text-decoration: none; }

  /* Top control strip */
  .strip {
    height: 64px;
    background: #0E0E0C;
    color: #ECEAE0;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 24px;
    border-bottom: 1px solid rgba(236,234,224,0.08);
    z-index: 10;
    position: relative;
  }
  .strip-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .strip-title .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #8A8A85;
  }
  .strip-title .story {
    font-size: 12px;
    font-weight: 400;
    color: #A8A8A2;
    font-style: italic;
    margin-left: 12px;
  }
  .group {
    display: flex;
    gap: 4px;
    background: rgba(236,234,224,0.04);
    padding: 4px;
    border-radius: 10px;
  }
  .group button {
    background: transparent;
    border: none;
    color: #A8A8A2;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 120ms ease, color 120ms ease;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group button:hover { color: #ECEAE0; }
  .group button.active {
    background: #ECEAE0;
    color: #0E0E0C;
    font-weight: 600;
  }
  .group button .key {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.10);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .group button:not(.active) .key { color: #6E6E6A; background: rgba(236,234,224,0.06); }

  .meta {
    margin-left: auto;
    font-size: 12px;
    color: #8A8A85;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .meta a { color: #ECEAE0; opacity: 0.6; }
  .meta a:hover { opacity: 1; }

  iframe {
    border: 0;
    width: 100%;
    height: calc(100vh - 64px);
    background: var(--bg-base, #FAFAF7);
    transition: opacity 120ms ease;
  }
</style>
</head>
<body>

<header class="strip">
  <div class="strip-title">
    <span class="label">Percy palette test</span>
    <span id="story" class="story">Engineer's working notebook. Graph paper. Graphite blue.</span>
  </div>

  <div class="group" id="palettes">
    <button data-key="inkwell"><span class="key">1</span>Inkwell</button>
    <button data-key="press"><span class="key">2</span>Press</button>
    <button data-key="notebook" class="active"><span class="key">3</span>Notebook</button>
    <button data-key="sodium"><span class="key">4</span>Sodium</button>
  </div>

  <div class="group" id="modes">
    <button data-key="light" class="active"><span class="key">L</span>Light</button>
    <button data-key="dark"><span class="key">D</span>Dark</button>
  </div>

  <div class="meta">
    <a href="_concepts.md">concepts</a>
    <a href="../index.html">← back</a>
  </div>
</header>

<iframe id="frame" src="dashboard.html?palette=notebook&mode=light"></iframe>

<script src="tokens.js"></script>
<script>
  const frame = document.getElementById('frame');
  const story = document.getElementById('story');
  let currentPalette = 'notebook';
  let currentMode = 'light';

  function refresh() {
    // Reload the iframe with the right query string
    frame.src = `dashboard.html?palette=${currentPalette}&mode=${currentMode}`;
    const p = window.PERCY_PALETTES[currentPalette];
    if (p) story.textContent = p.story;
  }

  function setActive(group, key) {
    document.querySelectorAll(`#${group} button`).forEach(b => {
      b.classList.toggle('active', b.dataset.key === key);
    });
  }

  document.getElementById('palettes').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-key]');
    if (!btn) return;
    currentPalette = btn.dataset.key;
    setActive('palettes', currentPalette);
    refresh();
  });

  document.getElementById('modes').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-key]');
    if (!btn) return;
    currentMode = btn.dataset.key;
    setActive('modes', currentMode);
    refresh();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    const palettes = ['inkwell', 'press', 'notebook', 'sodium'];
    if (key === '1' || key === '2' || key === '3' || key === '4') {
      currentPalette = palettes[parseInt(key) - 1];
      setActive('palettes', currentPalette);
      refresh();
    } else if (key === 'l') {
      currentMode = 'light';
      setActive('modes', currentMode);
      refresh();
    } else if (key === 'd') {
      currentMode = 'dark';
      setActive('modes', currentMode);
      refresh();
    }
  });
</script>

</body>
</html>
